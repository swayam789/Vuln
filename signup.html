<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Cyber Crime & Security Awareness</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <img src="public/logo.png" alt="CCSA Logo" class="logo-image">
                    <span>Cyber Crime & Security Awareness</span>
                </div>
                <h1>Join Our Club</h1>
                <p>Create your account to get started</p>
            </div>
            
            <form id="signupForm" class="login-form">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password *</label>
                    <div class="password-input-container">
                        <input type="password" id="password" name="password" required placeholder="Create a password">
                        <div class="password-toggle" onclick="togglePassword()">
                            <span id="toggleIcon">👁️</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
                </div>
                
                <div class="form-group">
                    <label for="major">Major</label>
                    <input type="text" id="major" name="major" placeholder="e.g., Computer Science">
                </div>
                
                <div class="form-group">
                    <label for="year">Year</label>
                    <select id="year" name="year">
                        <option value="">Select Year</option>
                        <option value="Freshman">Freshman</option>
                        <option value="Sophomore">Sophomore</option>
                        <option value="Junior">Junior</option>
                        <option value="Senior">Senior</option>
                        <option value="Graduate">Graduate</option>
                    </select>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" name="terms" required>
                        <span>I agree to the terms and conditions</span>
                    </label>
                </div>
                
                <div id="signupStatus" class="form-status" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                
                <div class="login-divider">
                    <span>or</span>
                </div>
                
                <div class="social-login">
                    <button type="button" class="btn btn-outline btn-full">
                        <span class="social-icon">🎓</span>
                        Sign up with College ID
                    </button>
                </div>
            </form>
            
            <div class="login-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
                <p>Having trouble? <a href="mailto:ccsa@forbescollege.edu">Contact support</a></p>
            </div>
        </div>
        
        <div class="login-background">
            <div class="cyber-pattern">
                <svg width="100%" height="100%" viewBox="0 0 1000 1000">
                    <defs>
                        <pattern id="cyberGrid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
                            <circle cx="25" cy="25" r="2" fill="#00d4ff" opacity="0.3"/>
                            <line x1="25" y1="0" x2="25" y2="50" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
                            <line x1="0" y1="25" x2="50" y2="25" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
                        </pattern>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#cyberGrid)"/>
                </svg>
            </div>
            
            <div class="floating-elements">
                <div class="float-element">🔒</div>
                <div class="float-element">🛡️</div>
                <div class="float-element">🔐</div>
                <div class="float-element">🔑</div>
                <div class="float-element">🚨</div>
                <div class="float-element">💻</div>
            </div>
        </div>
    </div>
    
    <script>
        // Password toggle functionality
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleIcon.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        }
        
        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('signupStatus');
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            statusDiv.className = `form-status ${type}`;
            
            // Hide after 5 seconds
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
        
        // Signup form handling
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value.trim();
            const major = document.getElementById('major').value.trim();
            const year = document.getElementById('year').value;
            const terms = document.getElementById('terms').checked;
            
            // Validation
            if (!name || !email || !username || !password || !confirmPassword) {
                showStatus('Please fill in all required fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showStatus('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showStatus('Password must be at least 6 characters long', 'error');
                return;
            }
            
            if (!terms) {
                showStatus('Please agree to the terms and conditions', 'error');
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showStatus('Please enter a valid email address', 'error');
                return;
            }
            
            // Username validation
            if (username.length < 3) {
                showStatus('Username must be at least 3 characters long', 'error');
                return;
            }
            
            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Creating Account...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password,
                        phone: phone,
                        major: major,
                        year: year,
                        role: 'client' // Always set to client for signup
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showStatus('Account created successfully! Redirecting to dashboard...', 'success');
                    
                    // Redirect to client dashboard after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    showStatus(data.message || 'Registration failed', 'error');
                }
            } catch (error) {
                console.error('Signup error:', error);
                showStatus('Failed to connect to server. Please try again.', 'error');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // College ID signup (placeholder)
        document.querySelector('.social-login button').addEventListener('click', function() {
            showStatus('College ID signup will be implemented soon', 'info');
        });
        
        // Real-time validation
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            
            if (confirmPassword && password !== confirmPassword) {
                this.style.borderColor = '#ff4444';
            } else if (confirmPassword && password === confirmPassword) {
                this.style.borderColor = '#00d4ff';
            } else {
                this.style.borderColor = '';
            }
        });
        
        // Floating animation
        const floatElements = document.querySelectorAll('.float-element');
        floatElements.forEach((element, index) => {
            element.style.animationDelay = `${index * 0.5}s`;
        });
    </script>
    
    <style>
        .login-page {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .login-container {
            display: flex;
            min-height: 100vh;
            position: relative;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        
        .login-card {
            max-width: 500px;
            margin: 2rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            position: relative;
            z-index: 10;
            width: 100%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo img {
            height: 50px;
            width: auto;
            margin-bottom: 0.5rem;
        }
        
        .login-logo h2 {
            color: #00d4ff;
            font-size: 2rem;
            margin: 0;
        }
        
        .login-logo span {
            color: #666;
            font-size: 0.8rem;
            display: block;
            margin-top: 0.25rem;
        }
        
        .login-header h1 {
            color: white;
            font-size: 1.8rem;
            margin: 1rem 0 0.5rem 0;
        }
        
        .login-header p {
            color: #999;
            margin: 0;
        }
        
        .login-form {
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .password-input-container {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            user-select: none;
        }
        
        .form-options {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            color: #ccc;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .checkbox-label input {
            margin-right: 0.5rem;
            width: auto;
        }
        
        .form-status {
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .form-status.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .form-status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        
        .form-status.info {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }
        
        .login-divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .login-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .login-divider span {
            background: rgba(10, 10, 10, 0.9);
            padding: 0 1rem;
            color: #999;
            font-size: 0.9rem;
        }
        
        .social-login {
            margin-bottom: 1.5rem;
        }
        
        .social-icon {
            margin-right: 0.5rem;
        }
        
        .login-footer {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
        }
        
        .login-footer p {
            margin: 0.5rem 0;
        }
        
        .login-footer a {
            color: #00d4ff;
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .login-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 1;
        }
        
        .cyber-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.3;
        }
        
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        .float-element {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        
        .float-element:nth-child(1) { top: 10%; left: 10%; }
        .float-element:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .float-element:nth-child(3) { top: 60%; left: 5%; animation-delay: 2s; }
        .float-element:nth-child(4) { top: 70%; right: 10%; animation-delay: 3s; }
        .float-element:nth-child(5) { top: 40%; left: 50%; animation-delay: 4s; }
        .float-element:nth-child(6) { top: 80%; left: 30%; animation-delay: 5s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        
        @media (max-width: 768px) {
            .login-container {
                padding: 1rem;
            }
            
            .login-card {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</body>
</html>
